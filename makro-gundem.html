<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makro Gündem — Finansor AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--bg-0:#06080d;--bg-1:#0c0f16;--bg-2:#12161f;--bg-3:#1a1f2e;--bg-4:#222838;--border:#1e2433;--border-light:#2a3040;--text-0:#f0f2f5;--text-1:#c4c9d4;--text-2:#8891a4;--text-3:#5a6378;--accent:#3b82f6;--accent-light:#60a5fa;--green:#10b981;--green-dim:rgba(16,185,129,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--yellow:#f59e0b;--yellow-dim:rgba(245,158,11,0.12);--purple:#8b5cf6;--cyan:#06b6d4;--gradient-1:linear-gradient(135deg,#3b82f6,#8b5cf6)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg-0);color:var(--text-1);line-height:1.6;overflow-x:hidden}
        nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,8,13,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
        .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text-0);font-weight:700;font-size:18px}
        .nav-brand span{background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .nav-links{display:flex;align-items:center;gap:8px;list-style:none}
        .nav-links a{color:var(--text-2);text-decoration:none;font-size:14px;font-weight:500;padding:8px 16px;border-radius:8px;transition:all 0.2s}
        .nav-links a:hover,.nav-links a.active{color:var(--text-0);background:var(--bg-3)}
        .mobile-menu{display:none;background:none;border:none;color:var(--text-1);font-size:24px;cursor:pointer}
        @media(max-width:768px){.nav-links{display:none}.mobile-menu{display:block}.nav-links.open{display:flex;flex-direction:column;position:absolute;top:64px;left:0;right:0;background:var(--bg-1);border-bottom:1px solid var(--border);padding:16px}}

        .macro{max-width:1400px;margin:0 auto;padding:84px 24px 40px}
        .macro-header{margin-bottom:28px}
        .macro-header h1{font-size:24px;font-weight:700;color:var(--text-0);margin-bottom:4px}
        .macro-header .sub{font-size:13px;color:var(--text-3);font-family:'JetBrains Mono',monospace}

        /* Brief Card */
        .brief-card{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(139,92,246,0.06));border:1px solid var(--border-light);border-radius:14px;padding:28px;margin-bottom:28px}
        .brief-card h2{font-size:18px;font-weight:700;color:var(--text-0);margin-bottom:4px;display:flex;align-items:center;gap:8px}
        .brief-regime{display:inline-block;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:12px}
        .regime-risk-off{background:var(--red-dim);color:var(--red)}
        .regime-risk-on{background:var(--green-dim);color:var(--green)}
        .brief-card p{font-size:14px;color:var(--text-1);line-height:1.7}

        /* Sentiment Overview */
        .sentiment-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
        .sent-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
        .sent-card .label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px}
        .sent-card .value{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text-0);margin-top:4px}

        /* Grid */
        .macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
        @media(max-width:900px){.macro-grid{grid-template-columns:1fr}}

        .card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:24px}
        .card-title{font-size:14px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}

        /* Theme Cards */
        .theme-card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
        .theme-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .theme-header .left{display:flex;align-items:center;gap:10px}
        .theme-header .icon{font-size:24px}
        .theme-header h3{font-size:16px;font-weight:600;color:var(--text-0)}
        .theme-sentiment{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600}
        .sent-bullish{background:var(--green-dim);color:var(--green)}
        .sent-bearish{background:var(--red-dim);color:var(--red)}
        .sent-neutral{background:var(--yellow-dim);color:var(--yellow)}

        .theme-trend{font-size:12px;color:var(--text-3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}

        .news-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
        .news-item:last-child{border-bottom:none}
        .news-item .text{font-size:13px;color:var(--text-1);flex:1}
        .news-item .text a{color:var(--text-1);text-decoration:none}
        .news-item .text a:hover{color:var(--accent-light)}
        .news-item .meta{text-align:right;min-width:90px}
        .news-item .source{font-size:11px;color:var(--accent-light);font-weight:500}
        .news-item .time{font-size:11px;color:var(--text-3);font-family:'JetBrains Mono',monospace}
        .impact-badge{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
        .impact-bullish{background:var(--green)}.impact-bearish{background:var(--red)}.impact-neutral{background:var(--yellow)}

        /* Asset Impact */
        .impact-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
        .impact-item:last-child{border-bottom:none}
        .impact-item .asset{font-weight:600;color:var(--text-0)}
        .impact-item .ticker{color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:12px}
        .impact-item .driver{color:var(--text-2);font-size:12px;flex:1;margin:0 16px}
        .impact-bar{width:80px;height:6px;background:var(--bg-4);border-radius:3px;overflow:hidden;position:relative}
        .impact-bar .fill{height:100%;border-radius:3px;position:absolute}
        .impact-bar .fill.pos{right:50%;background:var(--green)}
        .impact-bar .fill.neg{left:50%;background:var(--red)}
        .impact-bar .center{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--text-3)}

        /* Events */
        .event-card{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
        .event-card:last-child{border-bottom:none}
        .event-card .name{font-weight:600;color:var(--text-0)}
        .event-card .date{color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:12px}
        .event-card .expected{color:var(--text-2);font-size:12px}
        .importance{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
        .imp-critical{background:var(--red-dim);color:var(--red)}
        .imp-high{background:var(--yellow-dim);color:var(--yellow)}
        .imp-medium{background:rgba(59,130,246,0.12);color:var(--accent-light)}

        footer{padding:40px 24px;border-top:1px solid var(--border);text-align:center}
        .footer-links{display:flex;gap:24px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
        .footer-links a{color:var(--text-2);text-decoration:none;font-size:14px}
        .footer-links a:hover{color:var(--text-0)}
        .footer-copy{font-size:13px;color:var(--text-3)}
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">📊 <span>Finansor AI</span></a>
        <button class="mobile-menu" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Marketplace</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="makro-gundem.html" class="active">Makro Gündem</a></li>
            <li><a href="pricing.html">Pricing</a></li>
        </ul>
    </nav>

    <div class="macro">
        <div class="macro-header">
            <h1>🌐 Makro Gündem — Macro Intelligence Terminal</h1>
            <div class="sub" id="macroTime">Loading...</div>
        </div>

        <!-- Brief -->
        <div class="brief-card" id="briefCard"></div>

        <!-- Sentiment Overview -->
        <div class="sentiment-row" id="sentimentRow"></div>

        <!-- Asset Impact + Events -->
        <div class="macro-grid">
            <div class="card">
                <div class="card-title">📈 Asset Impact Matrix</div>
                <div id="assetImpact"></div>
            </div>
            <div class="card">
                <div class="card-title">📅 Upcoming Events</div>
                <div id="upcomingEvents"></div>
            </div>
        </div>

        <!-- Theme Feeds -->
        <div id="themeFeeds"></div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="index.html">Marketplace</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="makro-gundem.html">Makro Gündem</a>
            <a href="pricing.html">Pricing</a>
        </div>
        <div class="footer-copy">© 2026 Finansor AI</div>
    </footer>

    <script>
        async function loadMacro() {
            let data;
            try { const r = await fetch('data/macro.json'); data = await r.json(); } catch(e) { return; }

            document.getElementById('macroTime').textContent = 'Updated: ' + new Date(data.timestamp).toLocaleString();

            // Brief
            const b = data.macro_brief;
            const regimeClass = b.risk_regime.toLowerCase().includes('off') ? 'regime-risk-off' : 'regime-risk-on';
            document.getElementById('briefCard').innerHTML = `
                <h2>📋 ${b.title}</h2>
                <span class="brief-regime ${regimeClass}">${b.risk_regime}</span>
                <p>${b.summary}</p>
            `;

            // Sentiment
            const s = data.sentiment_overview;
            document.getElementById('sentimentRow').innerHTML = `
                <div class="sent-card"><div class="label">Overall Sentiment</div><div class="value" style="color:${s.overall>=0?'var(--green)':'var(--red)'}">${s.overall>=0?'+':''}${s.overall.toFixed(2)}</div></div>
                <div class="sent-card"><div class="label">Fear & Greed</div><div class="value">${s.fear_greed}</div></div>
                <div class="sent-card"><div class="label">VIX</div><div class="value">${s.vix}</div></div>
                <div class="sent-card"><div class="label">Put/Call Ratio</div><div class="value">${s.put_call_ratio}</div></div>
                <div class="sent-card"><div class="label">Risk Appetite</div><div class="value">${s.risk_appetite}%</div></div>
                <div class="sent-card"><div class="label">Market Breadth</div><div class="value">${(s.market_breadth*100).toFixed(0)}%</div></div>
            `;

            // Asset Impact
            document.getElementById('assetImpact').innerHTML = data.asset_impact.map(a => {
                const pct = Math.abs(a.impact_score) * 50;
                const dir = a.impact_score >= 0 ? 'pos' : 'neg';
                const style = dir === 'pos' ? `right:50%;width:${pct}%` : `left:50%;width:${pct}%`;
                return `
                    <div class="impact-item">
                        <div><span class="asset">${a.asset}</span> <span class="ticker">${a.ticker}</span></div>
                        <div class="driver">${a.key_driver}</div>
                        <div class="impact-bar"><div class="center"></div><div class="fill ${dir}" style="${style}"></div></div>
                    </div>
                `;
            }).join('');

            // Events
            document.getElementById('upcomingEvents').innerHTML = data.upcoming_events.map(e => `
                <div class="event-card">
                    <div>
                        <div class="name">${e.event}</div>
                        <div class="expected">${e.expected}</div>
                    </div>
                    <div style="text-align:right">
                        <span class="importance imp-${e.importance}">${e.importance}</span>
                        <div class="date">${new Date(e.date).toLocaleDateString('en-US', {month:'short',day:'numeric'})}</div>
                    </div>
                </div>
            `).join('');

            // Theme Feeds
            document.getElementById('themeFeeds').innerHTML = data.themes.map(t => {
                const sentClass = t.sentiment > 0.1 ? 'sent-bullish' : t.sentiment < -0.1 ? 'sent-bearish' : 'sent-neutral';
                const sentLabel = t.sentiment > 0.1 ? 'Bullish' : t.sentiment < -0.1 ? 'Bearish' : 'Neutral';
                return `
                    <div class="theme-card">
                        <div class="theme-header">
                            <div class="left"><span class="icon">${t.icon}</span><h3>${t.name}</h3></div>
                            <span class="theme-sentiment ${sentClass}">${sentLabel} (${t.sentiment>=0?'+':''}${t.sentiment.toFixed(2)})</span>
                        </div>
                        <div class="theme-trend">Trend: ${t.trend}</div>
                        ${t.items.map(i => `
                            <div class="news-item">
                                <div class="text">
                                    <span class="impact-badge impact-${i.impact}"></span>
                                    <a href="${i.url}" target="_blank" rel="noopener">${i.text}</a>
                                </div>
                                <div class="meta">
                                    <div class="source">${i.source}</div>
                                    <div class="time">${new Date(i.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }

        loadMacro();
    </script>
</body>
</html>
