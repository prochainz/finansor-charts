<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Finansor AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        :root{--bg:#0a0e17;--bg2:#111827;--card:#151d2e;--border:#1e2a3a;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--accent2:#8b5cf6;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--cyan:#06b6d4;--gradient:linear-gradient(135deg,#3b82f6,#8b5cf6)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}a{color:var(--accent);text-decoration:none}
        nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,14,23,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}.nav-inner{max-width:1440px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}.nav-logo{font-size:20px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px}.nav-logo span{font-size:24px;-webkit-text-fill-color:initial}.nav-links{display:flex;gap:32px;align-items:center}.nav-links a{color:var(--text2);font-size:14px;font-weight:500}.nav-links a:hover,.nav-links a.active{color:var(--text)}.nav-cta{background:var(--gradient);color:white!important;padding:8px 20px;border-radius:8px;font-weight:600;font-size:13px}.nav-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green)}.nav-status::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        .hamburger{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer}

        .dash{max-width:1440px;margin:0 auto;padding:80px 24px 40px}
        .dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
        .dash-header h1{font-size:28px;font-weight:800}
        .dash-time{color:var(--text2);font-size:13px}

        /* KPI row */
        .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px}
        .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
        .kpi-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
        .kpi-val{font-size:24px;font-weight:800}
        .kpi-sub{font-size:12px;color:var(--text2);margin-top:4px}

        /* Grid layout */
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        .grid-3{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px}
        .panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px}
        .panel h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

        /* Agent status list */
        .agent-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
        .agent-row:last-child{border-bottom:none}
        .agent-dot{width:8px;height:8px;border-radius:50%}
        .dot-green{background:var(--green)}
        .dot-yellow{background:var(--yellow)}
        .dot-red{background:var(--red)}
        .agent-row-name{font-weight:600;font-size:14px;flex:1}
        .agent-row-stat{font-size:12px;color:var(--text2);margin-left:8px}
        .agent-row-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}

        /* Signal mini table */
        .mini-table{width:100%;font-size:13px;border-collapse:collapse}
        .mini-table th{text-align:left;color:var(--text2);font-weight:500;font-size:11px;padding:8px 0;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
        .mini-table td{padding:10px 0;border-bottom:1px solid rgba(30,42,58,0.5)}
        .mini-table .ticker{font-weight:700}

        /* Portfolio allocation */
        .alloc-bar{height:24px;border-radius:8px;display:flex;overflow:hidden;margin-bottom:12px}
        .alloc-seg{height:100%;transition:0.3s}
        .alloc-legend{display:flex;flex-wrap:wrap;gap:12px}
        .legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
        .legend-dot{width:10px;height:10px;border-radius:3px}

        /* Regime */
        .regime-badge{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;padding:8px 16px;border-radius:10px;margin-bottom:12px}
        .regime-desc{font-size:13px;color:var(--text2);line-height:1.5}

        /* Activity log */
        .log-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
        .log-item:last-child{border-bottom:none}
        .log-time{color:var(--text2);font-size:11px;white-space:nowrap;min-width:50px}
        .log-icon{font-size:14px}

        footer{border-top:1px solid var(--border);padding:48px 24px}.footer-inner{max-width:1440px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}.footer-links{display:flex;gap:24px}.footer-links a{color:var(--text2);font-size:13px}.footer-copy{color:var(--text2);font-size:13px}
        @media(max-width:768px){.nav-links{display:none}.hamburger{display:block}.grid-2,.grid-3{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
    <nav><div class="nav-inner"><a href="index.html" class="nav-logo"><span>📊</span> Finansor AI</a><div class="nav-links"><a href="index.html">Home</a><a href="agents.html">Agents</a><a href="signals.html">Signals</a><a href="dashboard.html" class="active">Dashboard</a><a href="backtest.html">Backtest</a><a href="macro.html">Macro</a><a href="pricing.html">Pricing</a><div class="nav-status">Systems Online</div></div><button class="hamburger" onclick="document.querySelector('.nav-links').style.display=document.querySelector('.nav-links').style.display==='flex'?'none':'flex'">☰</button></div></nav>

    <div class="dash">
        <div class="dash-header">
            <h1>📊 Control Center</h1>
            <div class="dash-time" id="dashTime"></div>
        </div>

        <!-- KPI Row -->
        <div class="kpi-row" id="kpiRow"></div>

        <!-- Agents + Regime -->
        <div class="grid-2">
            <div class="panel">
                <h3>🤖 Agent Status</h3>
                <div id="agentStatus"></div>
            </div>
            <div class="panel">
                <h3>📈 Market Regime</h3>
                <div id="regimePanel"></div>
            </div>
        </div>

        <!-- Signals + Portfolio -->
        <div class="grid-3">
            <div class="panel">
                <h3>⚡ Latest Signals <a href="signals.html" style="font-size:12px;margin-left:auto;font-weight:400">View All →</a></h3>
                <table class="mini-table">
                    <thead><tr><th>Ticker</th><th>Price</th><th>Change</th><th>Signal</th><th>Score</th></tr></thead>
                    <tbody id="signalTable"></tbody>
                </table>
            </div>
            <div class="panel">
                <h3>🥧 Portfolio Allocation</h3>
                <div id="portfolioPanel"></div>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="panel">
            <h3>📋 Activity Log</h3>
            <div id="activityLog"></div>
        </div>
    </div>

    <footer><div class="footer-inner"><div class="footer-copy">© 2026 Finansor AI</div><div class="footer-links"><a href="https://github.com/prochainz/finansor-quant">GitHub</a><a href="agents.html">Agents</a><a href="signals.html">Signals</a></div></div></footer>

    <script>
    Promise.all([
        fetch('data/dashboard.json').then(r=>r.json()),
        fetch('data/signals.json').then(r=>r.json()),
        fetch('data/agents.json').then(r=>r.json()),
        fetch('data/macro.json').then(r=>r.json())
    ]).then(([dash,sig,agents,macro])=>{
        document.getElementById('dashTime').textContent='Last update: '+new Date(dash.timestamp).toLocaleString();

        // KPIs
        const totalSignals=dash.agents.reduce((a,ag)=>a+ag.signals_today,0);
        const totalErrors=dash.agents.reduce((a,ag)=>a+ag.errors_24h,0);
        const avgWR=(dash.agents.reduce((a,ag)=>a+ag.win_rate,0)/dash.agents.length).toFixed(1);
        const runningCount=dash.agents.filter(a=>a.status==='running').length;
        document.getElementById('kpiRow').innerHTML=`
            <div class="kpi"><div class="kpi-label">Active Agents</div><div class="kpi-val" style="color:var(--green)">${runningCount}/${dash.agents.length}</div></div>
            <div class="kpi"><div class="kpi-label">Signals Today</div><div class="kpi-val" style="color:var(--accent)">${totalSignals}</div></div>
            <div class="kpi"><div class="kpi-label">Avg Win Rate</div><div class="kpi-val" style="color:var(--cyan)">${avgWR}%</div></div>
            <div class="kpi"><div class="kpi-label">Market Regime</div><div class="kpi-val" style="color:var(--yellow);font-size:16px">${macro.macro_brief.risk_regime}</div></div>
            <div class="kpi"><div class="kpi-label">Tracked Assets</div><div class="kpi-val">${sig.signals.length}</div></div>
            <div class="kpi"><div class="kpi-label">Errors (24h)</div><div class="kpi-val" style="color:${totalErrors>5?'var(--red)':'var(--green)'}">${totalErrors}</div></div>
        `;

        // Agent status
        const agentDiv=document.getElementById('agentStatus');
        dash.agents.forEach(a=>{
            const dotClass=a.status==='running'?'dot-green':a.status==='idle'?'dot-yellow':'dot-red';
            const badgeColor=a.status==='running'?'rgba(16,185,129,0.15);color:var(--green)':'rgba(245,158,11,0.15);color:var(--yellow)';
            agentDiv.innerHTML+=`
            <div class="agent-row">
                <div class="agent-dot ${dotClass}"></div>
                <div class="agent-row-name">${a.name}</div>
                <span class="agent-row-stat">WR: ${a.win_rate}%</span>
                <span class="agent-row-stat">CPU: ${a.cpu_usage}%</span>
                <span class="agent-row-badge" style="background:${badgeColor}">${a.status}</span>
            </div>`;
        });

        // Regime
        const regime=macro.macro_brief;
        const regimeColor=regime.risk_regime.includes('Off')?'var(--red)':'var(--green)';
        document.getElementById('regimePanel').innerHTML=`
            <div class="regime-badge" style="background:rgba(245,158,11,0.15);color:var(--yellow)">⚠️ ${regime.risk_regime}</div>
            <div class="regime-desc">${regime.summary}</div>
        `;

        // Signals table (top 10)
        const tbody=document.getElementById('signalTable');
        sig.signals.slice(0,10).forEach(s=>{
            const chgClass=s.changePct>=0?'green':'red';
            const arrow=s.changePct>=0?'▲':'▼';
            const sigColor=s.signal.includes('BUY')?'var(--green)':s.signal.includes('SELL')?'var(--red)':'var(--text2)';
            tbody.innerHTML+=`<tr>
                <td class="ticker">${s.ticker}</td>
                <td>$${s.price.toFixed(2)}</td>
                <td class="${chgClass}">${arrow}${Math.abs(s.changePct).toFixed(2)}%</td>
                <td style="color:${sigColor};font-weight:600;font-size:12px">${s.signal.replace(/[^\w\s]/g,'').trim()}</td>
                <td>${s.score.toFixed(3)}</td>
            </tr>`;
        });

        // Portfolio allocation
        const groups=[
            {name:'Growth Tech',pct:35,color:'#3b82f6'},
            {name:'Value/Dividend',pct:25,color:'#8b5cf6'},
            {name:'Momentum',pct:20,color:'#06b6d4'},
            {name:'Macro Hedge',pct:12,color:'#f59e0b'},
            {name:'Cash',pct:8,color:'#6b7280'}
        ];
        let barHtml='<div class="alloc-bar">';
        let legendHtml='<div class="alloc-legend">';
        groups.forEach(g=>{
            barHtml+=`<div class="alloc-seg" style="width:${g.pct}%;background:${g.color}" title="${g.name}: ${g.pct}%"></div>`;
            legendHtml+=`<div class="legend-item"><div class="legend-dot" style="background:${g.color}"></div>${g.name} ${g.pct}%</div>`;
        });
        barHtml+='</div>';legendHtml+='</div>';
        document.getElementById('portfolioPanel').innerHTML=barHtml+legendHtml+`
            <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
                <div style="background:var(--bg2);padding:12px;border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--text2)">Sharpe</div><div style="font-weight:700;color:var(--green)">1.42</div></div>
                <div style="background:var(--bg2);padding:12px;border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--text2)">Max DD</div><div style="font-weight:700;color:var(--red)">-8.3%</div></div>
            </div>
        `;

        // Activity log
        const logs=[
            {time:'22:30',icon:'🎯',text:'Sentiment Sniper detected BULLISH signal on NVDA (score: 0.72)'},
            {time:'22:15',icon:'📊',text:'Volatility Screener completed scan — 3 high-vol opportunities found'},
            {time:'22:00',icon:'🏛️',text:'Macro Radar updated — Fed hawkish tone, risk-off bias'},
            {time:'21:45',icon:'🚀',text:'Momentum Hunter flagged RKLB for breakout (ADX: 42)'},
            {time:'21:30',icon:'🛡️',text:'Risk Guardian: Portfolio VaR within limits (2.1% daily)'},
            {time:'21:00',icon:'⚡',text:'Signal engine completed cycle — 20 assets analyzed'},
            {time:'20:30',icon:'📡',text:'Twitter sentiment scan: 847 relevant tweets processed'},
            {time:'20:00',icon:'🔄',text:'Walk-forward validation completed for all strategies'}
        ];
        const logDiv=document.getElementById('activityLog');
        logs.forEach(l=>{
            logDiv.innerHTML+=`<div class="log-item"><div class="log-time">${l.time}</div><div class="log-icon">${l.icon}</div><div>${l.text}</div></div>`;
        });
    });
    </script>
</body>
</html>
